<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocsBot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="brand">
        <div class="brand-icon">◆</div>
        <div>
          <div class="brand-title">DocsBot</div>
          <div class="brand-sub">Project Dashboard</div>
        </div>
      </div>
      <div class="header-actions">
        <select id="projectSelect" class="project-select">
          <option value="" disabled selected>Select project...</option>
        </select>
        <button id="addFolder" class="add-folder-btn" title="Open folder">+</button>
      </div>
    </header>

    <!-- Landing (shown when no projects are registered) -->
    <div class="landing" id="landing" style="display:none;">
      <div class="landing-inner">
        <div class="landing-icon">◆</div>
        <h2 class="landing-title">Open a Folder to Continue</h2>
        <p class="landing-subtitle">Enter a project folder path — DocsBot will auto-detect the docs/ subdirectory.</p>
        <div class="landing-form">
          <input type="text" id="folderInput" class="folder-input" placeholder="/Users/you/MyProject" spellcheck="false">
          <button class="folder-btn" id="folderBtn">Open</button>
        </div>
        <div class="landing-error" id="landingError"></div>
      </div>
    </div>

    <!-- Recent Tasks -->
    <section class="section" id="sectionTodo">
      <div class="section-header">
        <h2 class="section-title">Recent Tasks</h2>
        <span class="section-count" id="todoCount"></span>
      </div>
      <div id="todoBody">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>Loading...</p>
        </div>
      </div>
    </section>

    <!-- Research -->
    <section class="section" id="sectionResearch">
      <div class="section-header">
        <h2 class="section-title">Research</h2>
        <span class="section-count" id="researchCount"></span>
      </div>
      <div id="researchBody">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>Loading...</p>
        </div>
      </div>
    </section>

    <!-- Engineering -->
    <section class="section" id="sectionEngineering">
      <div class="section-header">
        <h2 class="section-title">Engineering</h2>
        <span class="section-count" id="engineeringCount"></span>
      </div>
      <div id="engineeringBody">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>Loading...</p>
        </div>
      </div>
    </section>

    <!-- Notes -->
    <section class="section" id="sectionNotes">
      <div class="section-header">
        <h2 class="section-title">Notes</h2>
        <span class="section-count" id="notesCount"></span>
      </div>
      <div id="notesBody">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>Loading...</p>
        </div>
      </div>
    </section>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <button class="modal-close" id="modalClose">&times;</button>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
