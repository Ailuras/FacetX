<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocsBot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="brand">
        <div class="brand-icon">◆</div>
        <div>
          <div class="brand-title">DocsBot</div>
          <div class="brand-sub">Project Dashboard</div>
        </div>
      </div>
      <div class="header-actions">
        <select id="projectSelect" class="project-select">
          <option value="" disabled selected>选择项目...</option>
        </select>
      </div>
    </header>

    <!-- 最近代办 -->
    <section class="section" id="sectionTodo">
      <div class="section-header">
        <h2 class="section-title">最近代办</h2>
        <span class="section-count" id="todoCount"></span>
      </div>
      <div id="todoBody">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>加载中...</p>
        </div>
      </div>
    </section>

    <!-- 科研路线 -->
    <section class="section" id="sectionResearch">
      <div class="section-header">
        <h2 class="section-title">科研路线</h2>
        <span class="section-count" id="researchCount"></span>
      </div>
      <div id="researchBody">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>加载中...</p>
        </div>
      </div>
    </section>

    <!-- 工程模块 -->
    <section class="section" id="sectionEngineering">
      <div class="section-header">
        <h2 class="section-title">工程模块</h2>
        <span class="section-count" id="engineeringCount"></span>
      </div>
      <div id="engineeringBody">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>加载中...</p>
        </div>
      </div>
    </section>

    <!-- 笔记备忘 -->
    <section class="section" id="sectionNotes">
      <div class="section-header">
        <h2 class="section-title">笔记备忘</h2>
        <span class="section-count" id="notesCount"></span>
      </div>
      <div id="notesBody">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>加载中...</p>
        </div>
      </div>
    </section>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <button class="modal-close" id="modalClose">&times;</button>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
