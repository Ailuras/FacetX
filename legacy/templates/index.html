<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocsBot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script>
    (function(){ const t = localStorage.getItem('docsbot:theme'); if(t) document.documentElement.setAttribute('data-theme', t); })();
  </script>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="brand">
        <div class="brand-icon">◆</div>
        <div>
          <div class="brand-title">DocsBot</div>
          <div class="brand-sub">Project Dashboard</div>
        </div>
      </div>
      <div class="header-actions">
        <select id="projectSelect" class="project-select">
          <option value="" disabled selected>Select project...</option>
        </select>
        <button id="newProjectBtn" class="add-folder-btn" title="New project">+</button>
        <button id="themeToggle" class="theme-btn" title="Toggle theme">◑</button>
      </div>
    </header>

    <div class="landing" id="landing" style="display:none;">
      <div class="landing-inner">
        <div class="landing-icon">◆</div>
        <h2 class="landing-title">No projects yet</h2>
        <p class="landing-subtitle">Create your first project to get started.</p>
        <button class="folder-btn" id="landingNewBtn">New project</button>
        <p class="landing-hint">Or run <code>uv run docsbot migrate /path/to/project</code> to import an existing one.</p>
      </div>
    </div>

    <section class="section" id="sectionWeekly">
      <div class="section-header">
        <h2 class="section-title">Weekly</h2>
        <div class="week-nav" id="weekNav">
          <button class="week-nav-btn" id="weekPrev" title="Previous week">‹</button>
          <span class="week-nav-label" id="weekLabel"></span>
          <button class="week-nav-btn" id="weekNext" title="Next week">›</button>
        </div>
      </div>
      <div id="weeklyBody">
        <div class="loading-state"><div class="spinner"></div><p>Loading...</p></div>
      </div>
    </section>

    <section class="section" id="sectionTasks">
      <div class="section-header">
        <h2 class="section-title">Tasks</h2>
        <span class="section-count" id="tasksCount"></span>
        <button class="section-add-btn" id="newTaskBtn" title="New task">+</button>
      </div>
      <div class="task-filter-bar">
        <button class="task-filter-tab active" data-filter="todo">Todo</button>
        <button class="task-filter-tab" data-filter="done">Done</button>
        <button class="task-filter-tab" data-filter="skipped">Skipped</button>
        <button class="task-filter-tab" data-filter="">All</button>
      </div>
      <div id="tasksBody">
        <div class="loading-state"><div class="spinner"></div><p>Loading...</p></div>
      </div>
    </section>

    <section class="section" id="sectionResearch">
      <div class="section-header">
        <h2 class="section-title">Research</h2>
        <span class="section-count" id="researchCount"></span>
        <button class="section-add-btn" id="newResearchBtn" title="New research direction">+</button>
      </div>
      <div id="researchBody">
        <div class="loading-state"><div class="spinner"></div><p>Loading...</p></div>
      </div>
    </section>

    <section class="section" id="sectionNotes">
      <div class="section-header">
        <h2 class="section-title">Notes</h2>
        <span class="section-count" id="notesCount"></span>
        <button class="section-add-btn" id="newNoteBtn" title="New note">+</button>
      </div>
      <div id="notesBody">
        <div class="loading-state"><div class="spinner"></div><p>Loading...</p></div>
      </div>
    </section>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <button class="modal-close" id="modalClose">&times;</button>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <div class="modal-overlay" id="formOverlay">
    <div class="modal modal-form">
      <button class="modal-close" id="formClose">&times;</button>
      <div class="modal-body" id="formBody"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
